components:
  schemas:
    # Tag object structure
    tag:
      type: object
      properties:
        id:
          type: string
          description: Unique identifier for the tag.
        name:
          type: string
          description: Name of the tag.
        style:
          type: string
          description: Style/color of the tag.

    # Company object structure
    company:
      type: object
      properties:
        id:
          type: string
          description: Unique identifier for the company.
        name:
          type: string
          description: Name of the company.
        address:
          type: string
          nullable: true
          description: Address of the company.
        source:
          type: string
          nullable: true
          description: Source of the company.
        tags:
          type: array
          items:
            $ref: "#/components/schemas/tag"
          description: Tags associated with the company.
        created_at:
          type: string
          format: date-time
          description: Timestamp when the company was created.
        updated_at:
          type: string
          format: date-time
          description: Timestamp when the company was last updated.

    # Company create/update request
    company_request:
      type: object
      properties:
        company:
          type: object
          required:
            - name
          properties:
            name:
              type: string
              description: Company name.
              example: "Eve Corp"
            address:
              type: string
              description: Company address.
              example: "123 Main St, New York, NY"
            tag_ids:
              type: array
              items:
                type: string
              description: Array of tag IDs.
              example: ["a1b2c3d4-e5f6-7890-abcd-ef1234567890", "b2c3d4e5-f6a7-8901-bcde-f12345678901"]

    # Company list response structure
    company_list_response:
      type: object
      properties:
        companies:
          type: array
          items:
            $ref: "#/components/schemas/company"
          description: List of companies.
        pagination:
          $ref: "../schemas/common.yaml#/components/schemas/pagination"
      example:
        companies:
          - id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
            name: "Eve Corp"
            address: "123 Main St, New York, NY"
            source: null
            tags: []
            created_at: "2025-03-15T10:30:00.000Z"
            updated_at: "2025-03-15T10:30:00.000Z"
          - id: "b2c3d4e5-f6a7-8901-bcde-f12345678901"
            name: "Oliver Industries"
            address: "456 Oak Ave, San Francisco, CA"
            source: null
            tags: []
            created_at: "2025-03-14T14:22:00.000Z"
            updated_at: "2025-03-14T14:22:00.000Z"
        pagination:
          total_records: 42
          total_pages: 2
          current_page_number: 1
          page_size: 30

    # Single company response
    company_response:
      type: object
      properties:
        company:
          $ref: "#/components/schemas/company"
      example:
        company:
          id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
          name: "Eve Corp"
          address: "123 Main St, New York, NY"
          source: null
          tags: []
          created_at: "2025-03-15T10:30:00.000Z"
          updated_at: "2025-03-15T10:30:00.000Z"
