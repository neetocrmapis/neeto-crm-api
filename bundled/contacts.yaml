openapi: 3.0.3
info:
  title: NeetoCRM Contacts APIs
  version: 1.0.0
servers:
  - description: NeetoCRM APIs
    url: https://{your-subdomain}.neetocrm.com/api/external/v1
    variables:
      your-subdomain:
        default: spinkart
        description: Replace **spinkart** with your [workspace's subdomain](/getting-started/identifying-subdomain).
tags:
  - name: Contacts
    description: APIs to manage contacts in your workspace.
paths:
  /contacts:
    get:
      summary: List all contacts
      tags:
        - Contacts
      description: Retrieve a list of all contacts in your workspace. Results are ordered by creation date (newest first).
      parameters:
        - $ref: '#/components/parameters/api_key_header'
        - $ref: '#/components/parameters/page_number_param'
        - $ref: '#/components/parameters/page_size_param'
      responses:
        '200':
          description: Successfully retrieved contacts.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/contact_list_response'
    post:
      summary: Create a contact
      tags:
        - Contacts
      description: Create a new contact in your workspace.
      parameters:
        - $ref: '#/components/parameters/api_key_header'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/contact_request'
      responses:
        '201':
          description: Contact created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/contact_response'
  /contacts/{id}:
    get:
      summary: Get a contact
      tags:
        - Contacts
      description: Retrieve a single contact by its ID.
      parameters:
        - $ref: '#/components/parameters/api_key_header'
        - name: id
          in: path
          required: true
          description: The ID of the contact to retrieve. You can get the contact `id` by listing all contacts using our [List all contacts](/api-reference/contacts/list-contacts) API.
          schema:
            type: string
      responses:
        '200':
          description: Successfully retrieved the contact.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/contact_response'
    patch:
      summary: Update a contact
      tags:
        - Contacts
      description: Update an existing contact by its ID.
      parameters:
        - $ref: '#/components/parameters/api_key_header'
        - name: id
          in: path
          required: true
          description: The ID of the contact to update. You can get the contact `id` by listing all contacts using our [List all contacts](/api-reference/contacts/list-contacts) API.
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/contact_request'
      responses:
        '200':
          description: Contact updated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/contact_response'
    delete:
      summary: Delete a contact
      tags:
        - Contacts
      description: Delete a contact by its ID.
      parameters:
        - $ref: '#/components/parameters/api_key_header'
        - name: id
          in: path
          required: true
          description: The ID of the contact to delete. You can get the contact `id` by listing all contacts using our [List all contacts](/api-reference/contacts/list-contacts) API.
          schema:
            type: string
      responses:
        '200':
          description: Contact deleted successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/contact_delete_response'
components:
  parameters:
    api_key_header:
      in: header
      name: X-Api-Key
      description: X-Api-Key is used to authenticate requests using an API key. Provide your API key in this header to access protected endpoints. Refer to [Authentication](/getting-started/authentication) for more information.
      required: true
      schema:
        type: string
    page_number_param:
      in: query
      name: page_number
      description: Retrieve paginated results by specifying the desired page number. If this parameter is absent, all results will be returned.
      required: false
      schema:
        type: integer
    page_size_param:
      in: query
      name: page_size
      description: Set the number of results returned in the response. Defaulting to 30 when omitted.
      required: false
      schema:
        type: integer
  schemas:
    contact:
      type: object
      properties:
        id:
          type: string
          description: Unique identifier for the contact.
        name:
          type: string
          description: Name of the contact.
        email:
          type: string
          nullable: true
          description: Email address of the contact.
        phone_number:
          type: string
          nullable: true
          description: Phone number of the contact.
        company_id:
          type: string
          nullable: true
          description: Unique identifier of the associated company.
        organization_id:
          type: string
          description: Unique identifier of the organization.
        tag_ids:
          type: array
          items:
            type: string
          description: IDs of tags associated with the contact.
        owner:
          type: object
          nullable: true
          description: Owner of the contact.
          properties:
            id:
              type: string
              description: Unique identifier of the owner.
            name:
              type: string
              description: Name of the owner.
            email:
              type: string
              description: Email of the owner.
        company:
          type: object
          nullable: true
          description: Associated company.
          properties:
            id:
              type: string
              description: Unique identifier of the company.
            name:
              type: string
              description: Name of the company.
        field_values:
          type: array
          description: Custom field values associated with the contact.
          items:
            type: object
            properties:
              id:
                type: string
                description: Unique identifier of the field value.
              field_id:
                type: string
                description: Unique identifier of the custom field.
              value:
                type: string
                description: Value of the custom field.
        created_at:
          type: string
          format: date-time
          description: Timestamp when the contact was created.
        updated_at:
          type: string
          format: date-time
          description: Timestamp when the contact was last updated.
    pagination:
      type: object
      properties:
        total_records:
          type: integer
          description: Total number of records.
        total_pages:
          type: integer
          description: Total number of pages available.
        current_page_number:
          type: integer
          description: Current page number.
        page_size:
          type: integer
          description: Number of records per page.
    contact_list_response:
      type: object
      properties:
        contacts:
          type: array
          items:
            $ref: '#/components/schemas/contact'
          description: List of contacts.
        pagination:
          $ref: '#/components/schemas/pagination'
      example:
        contacts:
          - id: a1b2c3d4-e5f6-7890-abcd-ef1234567890
            name: Eve
            email: eve@example.com
            phone_number: ''
            created_at: '2025-03-15T10:30:00.000Z'
            updated_at: '2025-03-15T10:30:00.000Z'
            owner: null
            tags: []
            company:
              id: null
              name: null
          - id: b2c3d4e5-f6a7-8901-bcde-f12345678901
            name: Oliver
            email: oliver@example.com
            phone_number: '+1555123456'
            created_at: '2025-03-14T14:22:00.000Z'
            updated_at: '2025-03-14T14:22:00.000Z'
            owner: null
            tags: []
            company:
              id: null
              name: null
        pagination:
          total_records: 42
          total_pages: 2
          current_page_number: 1
          page_size: 30
    contact_request:
      type: object
      properties:
        contact:
          type: object
          required:
            - name
          properties:
            name:
              type: string
              description: Contact name.
              example: Eve
            email:
              type: string
              description: Email address.
              example: eve@example.com
            phone_number:
              type: string
              description: Phone number.
              example: '+1234567890'
            company_id:
              type: string
              description: Unique identifier of the associated company.
              example: a1b2c3d4-e5f6-7890-abcd-ef1234567890
            owner_id:
              type: string
              description: Unique identifier of the owner.
              example: a1b2c3d4-e5f6-7890-abcd-ef1234567890
            tag_ids:
              type: array
              items:
                type: string
              description: Array of tag IDs.
              example:
                - a1b2c3d4-e5f6-7890-abcd-ef1234567890
                - b2c3d4e5-f6a7-8901-bcde-f12345678901
            field_values_attributes:
              type: array
              description: Custom field values.
              items:
                type: object
                properties:
                  field_id:
                    type: string
                    description: Unique identifier of the custom field.
                  value:
                    type: string
                    description: Value for the custom field.
    contact_response:
      type: object
      properties:
        contact:
          $ref: '#/components/schemas/contact'
      example:
        contact:
          id: a1b2c3d4-e5f6-7890-abcd-ef1234567890
          name: Eve
          email: eve@example.com
          phone_number: ''
          created_at: '2025-03-15T10:30:00.000Z'
          updated_at: '2025-03-15T10:30:00.000Z'
          owner: null
          tags: []
          company:
            id: null
            name: null
    contact_delete_response:
      type: object
      properties:
        message:
          type: string
      example:
        message: Contact deleted successfully
