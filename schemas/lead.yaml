components:
  schemas:
    # Tag object structure
    tag:
      type: object
      properties:
        id:
          type: string
          description: Unique identifier for the tag.
        name:
          type: string
          description: Name of the tag.
        style:
          type: string
          description: Style/color of the tag.

    # Lead object structure
    lead:
      type: object
      properties:
        id:
          type: string
          description: Unique identifier for the lead.
        name:
          type: string
          description: Name of the lead.
        status:
          type: string
          enum: [open, converted, archived]
          description: Current status of the lead.
        unique_number:
          type: string
          description: Auto-generated unique number for the lead.
        email:
          type: string
          nullable: true
          description: Email address of the lead (from associated contact).
        phone_number:
          type: string
          nullable: true
          description: Phone number of the lead (from associated contact).
        contact_name:
          type: string
          nullable: true
          description: Name of the associated contact.
        contact_id:
          type: string
          nullable: true
          description: Unique identifier of the associated contact.
        company_name:
          type: string
          nullable: true
          description: Name of the associated company.
        company_id:
          type: string
          nullable: true
          description: Unique identifier of the associated company.
        owner:
          type: object
          nullable: true
          description: Owner of the lead.
          properties:
            id:
              type: string
              description: Unique identifier of the owner.
            name:
              type: string
              description: Name of the owner.
        tags:
          type: array
          items:
            $ref: "#/components/schemas/tag"
          description: Tags associated with the lead.
        created_at:
          type: string
          format: date-time
          description: Timestamp when the lead was created.
        updated_at:
          type: string
          format: date-time
          description: Timestamp when the lead was last updated.

    # Lead create/update request
    lead_request:
      type: object
      properties:
        lead:
          type: object
          required:
            - name
          properties:
            name:
              type: string
              description: Lead name.
              example: "Eve"
            status:
              type: string
              enum: [open, converted, archived]
              description: Lead status.
              example: "open"
            company_id:
              type: integer
              description: Associated company ID.
              example: 1
            contact_id:
              type: integer
              description: Associated contact ID.
              example: 1
            owner_id:
              type: integer
              description: Owner user ID.
              example: 1
            tag_ids:
              type: array
              items:
                type: integer
              description: Array of tag IDs.
              example: [1, 2]

    # Lead list response structure
    lead_list_response:
      type: object
      properties:
        leads:
          type: array
          items:
            $ref: "#/components/schemas/lead"
          description: List of leads.
        pagination:
          $ref: "../schemas/common.yaml#/components/schemas/pagination"
      example:
        leads:
          - id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
            name: "Eve"
            status: "open"
            unique_number: "L-001"
            email: "eve@example.com"
            phone_number: ""
            contact_name: "Eve"
            contact_id: null
            company_name: null
            company_id: null
            owner: null
            tags: []
            created_at: "2025-03-15T10:30:00.000Z"
            updated_at: "2025-03-15T10:30:00.000Z"
          - id: "b2c3d4e5-f6a7-8901-bcde-f12345678901"
            name: "Oliver"
            status: "converted"
            unique_number: "L-002"
            email: "oliver@example.com"
            phone_number: "+1555123456"
            contact_name: "Oliver"
            contact_id: "c1d2e3f4-a5b6-7890-cdef-123456789012"
            company_name: "Oliver Industries"
            company_id: "d2e3f4a5-b6c7-8901-def0-234567890123"
            owner: null
            tags: []
            created_at: "2025-03-14T14:22:00.000Z"
            updated_at: "2025-03-14T14:22:00.000Z"
        pagination:
          total_records: 42
          total_pages: 2
          current_page_number: 1
          page_size: 30

    # Single lead response
    lead_response:
      type: object
      properties:
        lead:
          $ref: "#/components/schemas/lead"
      example:
        lead:
          id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
          name: "Eve"
          status: "open"
          unique_number: "L-001"
          email: "eve@example.com"
          phone_number: ""
          contact_name: "Eve"
          contact_id: null
          company_name: null
          company_id: null
          owner: null
          tags: []
          created_at: "2025-03-15T10:30:00.000Z"
          updated_at: "2025-03-15T10:30:00.000Z"

    # Delete response
    lead_delete_response:
      type: object
      properties:
        message:
          type: string
      example:
        message: "Lead deleted successfully"
