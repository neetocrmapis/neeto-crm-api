components:
  schemas:
    # Contact object structure
    contact:
      type: object
      properties:
        id:
          type: string
          description: Unique identifier for the contact.
        name:
          type: string
          description: Name of the contact.
        email:
          type: string
          nullable: true
          description: Email address of the contact.
        phone_number:
          type: string
          nullable: true
          description: Phone number of the contact.
        company_id:
          type: string
          nullable: true
          description: Unique identifier of the associated company.
        organization_id:
          type: string
          description: Unique identifier of the organization.
        tag_ids:
          type: array
          items:
            type: string
          description: IDs of tags associated with the contact.
        owner:
          type: object
          nullable: true
          description: Owner of the contact.
          properties:
            id:
              type: string
              description: Unique identifier of the owner.
            name:
              type: string
              description: Name of the owner.
            email:
              type: string
              description: Email of the owner.
        company:
          type: object
          nullable: true
          description: Associated company.
          properties:
            id:
              type: string
              description: Unique identifier of the company.
            name:
              type: string
              description: Name of the company.
        field_values:
          type: array
          description: Custom field values associated with the contact.
          items:
            type: object
            properties:
              id:
                type: string
                description: Unique identifier of the field value.
              field_id:
                type: string
                description: Unique identifier of the custom field.
              value:
                type: string
                description: Value of the custom field.
        created_at:
          type: string
          format: date-time
          description: Timestamp when the contact was created.
        updated_at:
          type: string
          format: date-time
          description: Timestamp when the contact was last updated.

    # Contact create/update request
    contact_request:
      type: object
      properties:
        contact:
          type: object
          required:
            - name
          properties:
            name:
              type: string
              description: Contact name.
              example: "Eve"
            email:
              type: string
              description: Email address.
              example: "eve@example.com"
            phone_number:
              type: string
              description: Phone number.
              example: "+1234567890"
            company_id:
              type: string
              description: Unique identifier of the associated company.
              example: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
            owner_id:
              type: string
              description: Unique identifier of the owner.
              example: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
            tag_ids:
              type: array
              items:
                type: string
              description: Array of tag IDs.
              example: ["a1b2c3d4-e5f6-7890-abcd-ef1234567890", "b2c3d4e5-f6a7-8901-bcde-f12345678901"]
            field_values_attributes:
              type: array
              description: Custom field values.
              items:
                type: object
                properties:
                  field_id:
                    type: string
                    description: Unique identifier of the custom field.
                  value:
                    type: string
                    description: Value for the custom field.

    # Contact list response structure
    contact_list_response:
      type: object
      properties:
        contacts:
          type: array
          items:
            $ref: "#/components/schemas/contact"
          description: List of contacts.
        pagination:
          $ref: "../schemas/common.yaml#/components/schemas/pagination"
      example:
        contacts:
          - id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
            name: "Eve"
            email: "eve@example.com"
            phone_number: ""
            created_at: "2025-03-15T10:30:00.000Z"
            updated_at: "2025-03-15T10:30:00.000Z"
            owner: null
            tags: []
            company:
              id: null
              name: null
          - id: "b2c3d4e5-f6a7-8901-bcde-f12345678901"
            name: "Oliver"
            email: "oliver@example.com"
            phone_number: "+1555123456"
            created_at: "2025-03-14T14:22:00.000Z"
            updated_at: "2025-03-14T14:22:00.000Z"
            owner: null
            tags: []
            company:
              id: null
              name: null
        pagination:
          total_records: 42
          total_pages: 2
          current_page_number: 1
          page_size: 30

    # Single contact response
    contact_response:
      type: object
      properties:
        contact:
          $ref: "#/components/schemas/contact"
      example:
        contact:
          id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
          name: "Eve"
          email: "eve@example.com"
          phone_number: ""
          created_at: "2025-03-15T10:30:00.000Z"
          updated_at: "2025-03-15T10:30:00.000Z"
          owner: null
          tags: []
          company:
            id: null
            name: null

    # Delete response
    contact_delete_response:
      type: object
      properties:
        message:
          type: string
      example:
        message: "Contact deleted successfully"
