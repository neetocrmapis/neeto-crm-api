openapi: 3.0.3
info:
  title: NeetoCRM Deals APIs
  version: 1.0.0

servers:
  $ref: '../schemas/common.yaml#/servers'

tags:
  - name: Deals
    description: APIs to list deals in your workspace.

paths:
  /deals:
    get:
      summary: List all deals
      tags:
        - Deals
      description: Retrieve a paginated list of all deals in your workspace. Results are ordered by creation date (newest first).
      parameters:
        - $ref: '../schemas/common.yaml#/api_key_header'
        - $ref: '../schemas/common.yaml#/accept_header'
        - $ref: '../schemas/common.yaml#/page_number_param'
        - $ref: '../schemas/common.yaml#/page_size_param'
      responses:
        '200':
          description: Successfully retrieved deals.
          content:
            application/json:
              schema:
                $ref: '../schemas/deal.yaml#/components/schemas/deal_list_response'
        '401':
          description: Unauthorized - Invalid or missing API key.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "Could not authenticate, invalid API Key"
