openapi: 3.0.3
info:
  title: NeetoCRM Leads APIs
  version: 1.0.0
servers:
  - description: NeetoCRM APIs
    url: https://{your-subdomain}.neetocrm.com/api/external/v1
    variables:
      your-subdomain:
        default: spinkart
        description: Your [workspace subdomain](/getting-started/identifying-subdomain).
tags:
  - name: Leads
    description: Manage leads.
paths:
  /leads:
    get:
      summary: List all leads
      tags:
        - Leads
      description: List leads.
      parameters:
        - $ref: '#/components/parameters/api_key_header'
        - $ref: '#/components/parameters/page_number_param'
        - $ref: '#/components/parameters/page_size_param'
      responses:
        '200':
          description: Leads retrieved.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/lead_list_response'
    post:
      summary: Create a lead
      tags:
        - Leads
      description: Create a lead.
      parameters:
        - $ref: '#/components/parameters/api_key_header'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/lead_request'
      responses:
        '201':
          description: Lead created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/lead_response'
components:
  parameters:
    api_key_header:
      in: header
      name: X-Api-Key
      description: API key. See [Authentication](/getting-started/authentication).
      required: true
      schema:
        type: string
    page_number_param:
      in: query
      name: page_number
      description: Page number. Omit to return all results.
      required: false
      schema:
        type: integer
    page_size_param:
      in: query
      name: page_size
      description: Number of results per page. Defaults to 30.
      required: false
      schema:
        type: integer
  schemas:
    tag:
      type: object
      properties:
        id:
          type: string
          description: Unique identifier for the tag.
        name:
          type: string
          description: Name of the tag.
        style:
          type: string
          description: Style/color of the tag.
    lead:
      type: object
      properties:
        id:
          type: string
          description: Unique identifier for the lead.
        name:
          type: string
          description: Name of the lead.
        status:
          type: string
          enum:
            - open
            - converted
            - archived
          description: Current status of the lead.
        unique_number:
          type: string
          description: Auto-generated unique number for the lead.
        email:
          type: string
          nullable: true
          description: Email address of the lead (from associated contact).
        phone_number:
          type: string
          nullable: true
          description: Phone number of the lead (from associated contact).
        contact:
          type: object
          nullable: true
          description: Associated contact.
          properties:
            id:
              type: string
              description: Unique identifier of the contact.
            name:
              type: string
              description: Name of the contact.
        company:
          type: object
          nullable: true
          description: Associated company.
          properties:
            id:
              type: string
              description: Unique identifier of the company.
            name:
              type: string
              description: Name of the company.
        owner:
          type: string
          nullable: true
          description: Owner of the lead.
        tags:
          type: array
          items:
            $ref: '#/components/schemas/tag'
          description: Tags associated with the lead.
        created_at:
          type: string
          format: date-time
          description: Timestamp when the lead was created.
        updated_at:
          type: string
          format: date-time
          description: Timestamp when the lead was last updated.
    pagination:
      type: object
      properties:
        total_records:
          type: integer
          description: Total number of records.
        total_pages:
          type: integer
          description: Total number of pages available.
        current_page_number:
          type: integer
          description: Current page number.
        page_size:
          type: integer
          description: Number of records per page.
    lead_list_response:
      type: object
      properties:
        leads:
          type: array
          items:
            $ref: '#/components/schemas/lead'
          description: List of leads.
        pagination:
          $ref: '#/components/schemas/pagination'
      example:
        leads:
          - id: a1b2c3d4-e5f6-7890-abcd-ef1234567890
            name: Eve
            status: open
            unique_number: L-001
            email: eve@example.com
            phone_number: ''
            contact:
              id: null
              name: Eve
            company:
              id: null
              name: null
            owner: null
            tags: []
            created_at: '2025-03-15T10:30:00.000Z'
            updated_at: '2025-03-15T10:30:00.000Z'
          - id: b2c3d4e5-f6a7-8901-bcde-f12345678901
            name: Oliver
            status: converted
            unique_number: L-002
            email: oliver@example.com
            phone_number: '+1555123456'
            contact:
              id: c1d2e3f4-a5b6-7890-cdef-123456789012
              name: Oliver
            company:
              id: d2e3f4a5-b6c7-8901-def0-234567890123
              name: Oliver Industries
            owner: null
            tags: []
            created_at: '2025-03-14T14:22:00.000Z'
            updated_at: '2025-03-14T14:22:00.000Z'
        pagination:
          total_records: 42
          total_pages: 2
          current_page_number: 1
          page_size: 30
    lead_request:
      type: object
      properties:
        lead:
          type: object
          required:
            - name
          properties:
            name:
              type: string
              description: Lead name.
              example: Eve
            status:
              type: string
              enum:
                - open
                - converted
                - archived
              description: Lead status.
              example: open
            owner_id:
              type: string
              description: Unique identifier of the owner.
              example: a1b2c3d4-e5f6-7890-abcd-ef1234567890
            tag_ids:
              type: array
              items:
                type: string
              description: Array of tag IDs.
              example:
                - a1b2c3d4-e5f6-7890-abcd-ef1234567890
                - b2c3d4e5-f6a7-8901-bcde-f12345678901
    lead_response:
      type: object
      properties:
        lead:
          $ref: '#/components/schemas/lead'
      example:
        lead:
          id: a1b2c3d4-e5f6-7890-abcd-ef1234567890
          name: Eve
          status: open
          unique_number: L-001
          email: eve@example.com
          phone_number: ''
          contact:
            id: null
            name: Eve
          company:
            id: null
            name: null
          owner: null
          tags: []
          created_at: '2025-03-15T10:30:00.000Z'
          updated_at: '2025-03-15T10:30:00.000Z'
