openapi: 3.0.3
info:
  title: NeetoCRM Contacts APIs
  version: 1.0.0
  description: APIs for managing contacts in your NeetoCRM workspace.
  contact:
    email: support@neetocrm.com

servers:
  $ref: '../schemas/common.yaml#/servers'

tags:
  - name: Contacts
    description: APIs to manage contacts in your workspace.

paths:
  /contacts:
    get:
      summary: List all contacts
      tags:
        - Contacts
      description: Retrieve a paginated list of all contacts in your workspace. Results are ordered by creation date (newest first).
      parameters:
        - $ref: '../schemas/common.yaml#/api_key_header'
        - $ref: '../schemas/common.yaml#/accept_header'
        - $ref: '../schemas/common.yaml#/page_number_param'
        - $ref: '../schemas/common.yaml#/page_size_param'
      responses:
        '200':
          description: Successfully retrieved contacts.
          content:
            application/json:
              schema:
                $ref: '../schemas/contact.yaml#/components/schemas/contact_list_response'
        '401':
          description: Unauthorized - Invalid or missing API key.
          content:
            application/json:
              schema:
                $ref: '../schemas/common.yaml#/components/schemas/error_response'
              example:
                error: "Could not authenticate, invalid API Key"
    post:
      summary: Create a contact
      tags:
        - Contacts
      description: Create a new contact in your workspace.
      parameters:
        - $ref: '../schemas/common.yaml#/api_key_header'
        - $ref: '../schemas/common.yaml#/accept_header'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../schemas/contact.yaml#/components/schemas/contact_request'
      responses:
        '201':
          description: Contact created successfully.
          content:
            application/json:
              schema:
                $ref: '../schemas/contact.yaml#/components/schemas/contact_response'
        '401':
          description: Unauthorized - Invalid or missing API key.
          content:
            application/json:
              schema:
                $ref: '../schemas/common.yaml#/components/schemas/error_response'
              example:
                error: "Could not authenticate, invalid API Key"
        '422':
          description: Validation error - Invalid or missing parameters.
          content:
            application/json:
              schema:
                $ref: '../schemas/common.yaml#/components/schemas/validation_error_response'
              example:
                errors: ["Name can't be blank"]

  /contacts/{id}:
    get:
      summary: Get a contact
      tags:
        - Contacts
      description: Retrieve a single contact by its ID.
      parameters:
        - $ref: '../schemas/common.yaml#/api_key_header'
        - $ref: '../schemas/common.yaml#/accept_header'
        - name: id
          in: path
          required: true
          description: The ID of the contact to retrieve.
          schema:
            type: string
      responses:
        '200':
          description: Successfully retrieved the contact.
          content:
            application/json:
              schema:
                $ref: '../schemas/contact.yaml#/components/schemas/contact_response'
        '401':
          description: Unauthorized - Invalid or missing API key.
          content:
            application/json:
              schema:
                $ref: '../schemas/common.yaml#/components/schemas/error_response'
              example:
                error: "Could not authenticate, invalid API Key"
        '404':
          description: Contact not found.
          content:
            application/json:
              schema:
                $ref: '../schemas/common.yaml#/components/schemas/error_response'
              example:
                error: "Contact not found"
    patch:
      summary: Update a contact
      tags:
        - Contacts
      description: Update an existing contact by its ID.
      parameters:
        - $ref: '../schemas/common.yaml#/api_key_header'
        - $ref: '../schemas/common.yaml#/accept_header'
        - name: id
          in: path
          required: true
          description: The ID of the contact to update.
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../schemas/contact.yaml#/components/schemas/contact_request'
      responses:
        '200':
          description: Contact updated successfully.
          content:
            application/json:
              schema:
                $ref: '../schemas/contact.yaml#/components/schemas/contact_response'
        '401':
          description: Unauthorized - Invalid or missing API key.
          content:
            application/json:
              schema:
                $ref: '../schemas/common.yaml#/components/schemas/error_response'
              example:
                error: "Could not authenticate, invalid API Key"
        '404':
          description: Contact not found.
          content:
            application/json:
              schema:
                $ref: '../schemas/common.yaml#/components/schemas/error_response'
              example:
                error: "Contact not found"
        '422':
          description: Validation error - Invalid parameters.
          content:
            application/json:
              schema:
                $ref: '../schemas/common.yaml#/components/schemas/validation_error_response'
              example:
                errors: ["Name can't be blank"]
    delete:
      summary: Delete a contact
      tags:
        - Contacts
      description: Delete a contact by its ID.
      parameters:
        - $ref: '../schemas/common.yaml#/api_key_header'
        - $ref: '../schemas/common.yaml#/accept_header'
        - name: id
          in: path
          required: true
          description: The ID of the contact to delete.
          schema:
            type: string
      responses:
        '200':
          description: Contact deleted successfully.
          content:
            application/json:
              schema:
                $ref: '../schemas/contact.yaml#/components/schemas/contact_delete_response'
        '401':
          description: Unauthorized - Invalid or missing API key.
          content:
            application/json:
              schema:
                $ref: '../schemas/common.yaml#/components/schemas/error_response'
              example:
                error: "Could not authenticate, invalid API Key"
        '404':
          description: Contact not found.
          content:
            application/json:
              schema:
                $ref: '../schemas/common.yaml#/components/schemas/error_response'
              example:
                error: "Contact not found"
