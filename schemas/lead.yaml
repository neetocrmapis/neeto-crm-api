components:
  schemas:
    # Tag object structure
    tag:
      type: object
      properties:
        id:
          type: string
          description: Unique identifier for the tag.
        name:
          type: string
          description: Name of the tag.
        style:
          type: string
          description: Style/color of the tag.

    # Lead object structure
    lead:
      type: object
      properties:
        id:
          type: string
          description: Unique identifier for the lead.
        name:
          type: string
          description: Name of the lead.
        status:
          type: string
          enum: [open, converted, archived]
          description: Current status of the lead.
        unique_number:
          type: string
          description: Auto-generated unique number for the lead.
        email:
          type: string
          nullable: true
          description: Email address of the lead (from associated contact).
        phone_number:
          type: string
          nullable: true
          description: Phone number of the lead (from associated contact).
        contact_name:
          type: string
          nullable: true
          description: Name of the associated contact.
        contact_id:
          type: string
          nullable: true
          description: Unique identifier of the associated contact.
        company_name:
          type: string
          nullable: true
          description: Name of the associated company.
        company_id:
          type: string
          nullable: true
          description: Unique identifier of the associated company.
        owner:
          type: object
          nullable: true
          description: Owner of the lead.
          properties:
            id:
              type: string
              description: Unique identifier of the owner.
            name:
              type: string
              description: Name of the owner.
        tags:
          type: array
          items:
            $ref: "#/components/schemas/tag"
          description: Tags associated with the lead.
        created_at:
          type: string
          format: date-time
          description: Timestamp when the lead was created.
        updated_at:
          type: string
          format: date-time
          description: Timestamp when the lead was last updated.

    # Lead create/update request
    lead_request:
      type: object
      properties:
        lead:
          type: object
          required:
            - name
          properties:
            name:
              type: string
              description: Lead name.
              example: "John Doe"
            status:
              type: string
              enum: [open, converted, archived]
              description: Lead status.
              example: "open"
            company_id:
              type: integer
              description: Associated company ID.
              example: 1
            contact_id:
              type: integer
              description: Associated contact ID.
              example: 1
            owner_id:
              type: integer
              description: Owner user ID.
              example: 1
            tag_ids:
              type: array
              items:
                type: integer
              description: Array of tag IDs.
              example: [1, 2]

    # Lead list response structure
    lead_list_response:
      type: object
      properties:
        leads:
          type: array
          items:
            $ref: "#/components/schemas/lead"
          description: List of leads.
        pagination:
          $ref: "../schemas/common.yaml#/components/schemas/pagination"

    # Single lead response
    lead_response:
      type: object
      properties:
        lead:
          $ref: "#/components/schemas/lead"

    # Delete response
    lead_delete_response:
      type: object
      properties:
        message:
          type: string
          example: "Lead deleted successfully"
