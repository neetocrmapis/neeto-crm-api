openapi: 3.0.3
info:
  title: NeetoCRM Companies APIs
  version: 1.0.0
  description: APIs for managing companies in your NeetoCRM workspace.
  contact:
    email: support@neetocrm.com

servers:
  $ref: '../schemas/common.yaml#/servers'

tags:
  - name: Companies
    description: APIs to manage companies in your workspace.

paths:
  /companies:
    get:
      summary: List all companies
      tags:
        - Companies
      description: Retrieve a paginated list of all companies in your workspace. Results are ordered by creation date (newest first).
      parameters:
        - $ref: '../schemas/common.yaml#/api_key_header'
        - $ref: '../schemas/common.yaml#/accept_header'
        - $ref: '../schemas/common.yaml#/page_number_param'
        - $ref: '../schemas/common.yaml#/page_size_param'
      responses:
        '200':
          description: Successfully retrieved companies.
          content:
            application/json:
              schema:
                $ref: '../schemas/company.yaml#/components/schemas/company_list_response'
        '401':
          description: Unauthorized - Invalid or missing API key.
          content:
            application/json:
              schema:
                $ref: '../schemas/common.yaml#/components/schemas/error_response'
              example:
                error: "Could not authenticate, invalid API Key"
    post:
      summary: Create a company
      tags:
        - Companies
      description: Create a new company in your workspace.
      parameters:
        - $ref: '../schemas/common.yaml#/api_key_header'
        - $ref: '../schemas/common.yaml#/accept_header'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../schemas/company.yaml#/components/schemas/company_request'
      responses:
        '201':
          description: Company created successfully.
          content:
            application/json:
              schema:
                $ref: '../schemas/company.yaml#/components/schemas/company_response'
        '401':
          description: Unauthorized - Invalid or missing API key.
          content:
            application/json:
              schema:
                $ref: '../schemas/common.yaml#/components/schemas/error_response'
              example:
                error: "Could not authenticate, invalid API Key"
        '422':
          description: Validation error - Invalid or missing parameters.
          content:
            application/json:
              schema:
                $ref: '../schemas/common.yaml#/components/schemas/validation_error_response'
              example:
                errors: ["Name can't be blank"]

  /companies/{id}:
    get:
      summary: Get a company
      tags:
        - Companies
      description: Retrieve a single company by its ID.
      parameters:
        - $ref: '../schemas/common.yaml#/api_key_header'
        - $ref: '../schemas/common.yaml#/accept_header'
        - name: id
          in: path
          required: true
          description: The ID of the company to retrieve.
          schema:
            type: string
      responses:
        '200':
          description: Successfully retrieved the company.
          content:
            application/json:
              schema:
                $ref: '../schemas/company.yaml#/components/schemas/company_response'
        '401':
          description: Unauthorized - Invalid or missing API key.
          content:
            application/json:
              schema:
                $ref: '../schemas/common.yaml#/components/schemas/error_response'
              example:
                error: "Could not authenticate, invalid API Key"
        '404':
          description: Company not found.
          content:
            application/json:
              schema:
                $ref: '../schemas/common.yaml#/components/schemas/error_response'
              example:
                error: "Company not found"
    patch:
      summary: Update a company
      tags:
        - Companies
      description: Update an existing company by its ID.
      parameters:
        - $ref: '../schemas/common.yaml#/api_key_header'
        - $ref: '../schemas/common.yaml#/accept_header'
        - name: id
          in: path
          required: true
          description: The ID of the company to update.
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../schemas/company.yaml#/components/schemas/company_request'
      responses:
        '200':
          description: Company updated successfully.
          content:
            application/json:
              schema:
                $ref: '../schemas/company.yaml#/components/schemas/company_response'
        '401':
          description: Unauthorized - Invalid or missing API key.
          content:
            application/json:
              schema:
                $ref: '../schemas/common.yaml#/components/schemas/error_response'
              example:
                error: "Could not authenticate, invalid API Key"
        '404':
          description: Company not found.
          content:
            application/json:
              schema:
                $ref: '../schemas/common.yaml#/components/schemas/error_response'
              example:
                error: "Company not found"
        '422':
          description: Validation error - Invalid parameters.
          content:
            application/json:
              schema:
                $ref: '../schemas/common.yaml#/components/schemas/validation_error_response'
              example:
                errors: ["Name can't be blank"]
    delete:
      summary: Delete a company
      tags:
        - Companies
      description: Delete a company by its ID.
      parameters:
        - $ref: '../schemas/common.yaml#/api_key_header'
        - $ref: '../schemas/common.yaml#/accept_header'
        - name: id
          in: path
          required: true
          description: The ID of the company to delete.
          schema:
            type: string
      responses:
        '200':
          description: Company deleted successfully.
          content:
            application/json:
              schema:
                $ref: '../schemas/company.yaml#/components/schemas/company_delete_response'
        '401':
          description: Unauthorized - Invalid or missing API key.
          content:
            application/json:
              schema:
                $ref: '../schemas/common.yaml#/components/schemas/error_response'
              example:
                error: "Could not authenticate, invalid API Key"
        '404':
          description: Company not found.
          content:
            application/json:
              schema:
                $ref: '../schemas/common.yaml#/components/schemas/error_response'
              example:
                error: "Company not found"
