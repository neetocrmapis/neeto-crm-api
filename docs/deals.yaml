openapi: 3.0.3
info:
  title: NeetoCRM Deals APIs
  version: 1.0.0
  description: APIs for managing deals in your NeetoCRM workspace.
  contact:
    email: support@neetocrm.com

servers:
  $ref: '../schemas/common.yaml#/servers'

tags:
  - name: Deals
    description: APIs to manage deals in your workspace.

paths:
  /deals:
    get:
      summary: List all deals
      tags:
        - Deals
      description: Retrieve a list of all deals in your workspace. Results are ordered by creation date (newest first).
      parameters:
        - $ref: '../schemas/common.yaml#/api_key_header'
        - $ref: '../schemas/common.yaml#/page_number_param'
        - $ref: '../schemas/common.yaml#/page_size_param'
      responses:
        '200':
          description: Successfully retrieved deals.
          content:
            application/json:
              schema:
                $ref: '../schemas/deal.yaml#/components/schemas/deal_list_response'
    post:
      summary: Create a deal
      tags:
        - Deals
      description: Create a new deal in your workspace.
      parameters:
        - $ref: '../schemas/common.yaml#/api_key_header'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../schemas/deal.yaml#/components/schemas/deal_request'
      responses:
        '201':
          description: Deal created successfully.
          content:
            application/json:
              schema:
                $ref: '../schemas/deal.yaml#/components/schemas/deal_response'

  /deals/{id}:
    get:
      summary: Get a deal
      tags:
        - Deals
      description: Retrieve a single deal by its ID.
      parameters:
        - $ref: '../schemas/common.yaml#/api_key_header'
        - name: id
          in: path
          required: true
          description: The ID of the deal to retrieve. You can get the deal `id` by listing all deals using our [List all deals](/api-reference/deals/list-deals) API.
          schema:
            type: string
      responses:
        '200':
          description: Successfully retrieved the deal.
          content:
            application/json:
              schema:
                $ref: '../schemas/deal.yaml#/components/schemas/deal_response'
    patch:
      summary: Update a deal
      tags:
        - Deals
      description: Update an existing deal by its ID.
      parameters:
        - $ref: '../schemas/common.yaml#/api_key_header'
        - name: id
          in: path
          required: true
          description: The ID of the deal to update. You can get the deal `id` by listing all deals using our [List all deals](/api-reference/deals/list-deals) API.
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../schemas/deal.yaml#/components/schemas/deal_request'
      responses:
        '200':
          description: Deal updated successfully.
          content:
            application/json:
              schema:
                $ref: '../schemas/deal.yaml#/components/schemas/deal_response'
    delete:
      summary: Delete a deal
      tags:
        - Deals
      description: Delete a deal by its ID.
      parameters:
        - $ref: '../schemas/common.yaml#/api_key_header'
        - name: id
          in: path
          required: true
          description: The ID of the deal to delete. You can get the deal `id` by listing all deals using our [List all deals](/api-reference/deals/list-deals) API.
          schema:
            type: string
      responses:
        '200':
          description: Deal deleted successfully.
          content:
            application/json:
              schema:
                $ref: '../schemas/deal.yaml#/components/schemas/deal_delete_response'
