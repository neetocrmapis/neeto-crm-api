openapi: 3.0.3
info:
  title: NeetoCRM Tasks APIs
  version: 1.0.0
  description: APIs for managing tasks in your NeetoCRM workspace.
  contact:
    email: support@neetocrm.com

servers:
  $ref: '../schemas/common.yaml#/servers'

tags:
  - name: Tasks
    description: APIs to manage tasks in your workspace.

paths:
  /tasks:
    get:
      summary: List all tasks
      tags:
        - Tasks
      description: Retrieve a paginated list of all tasks in your workspace. Results are ordered by creation date (newest first).
      parameters:
        - $ref: '../schemas/common.yaml#/api_key_header'
        - $ref: '../schemas/common.yaml#/accept_header'
        - $ref: '../schemas/common.yaml#/page_number_param'
        - $ref: '../schemas/common.yaml#/page_size_param'
      responses:
        '200':
          description: Successfully retrieved tasks.
          content:
            application/json:
              schema:
                $ref: '../schemas/task.yaml#/components/schemas/task_list_response'
        '401':
          description: Unauthorized - Invalid or missing API key.
          content:
            application/json:
              schema:
                $ref: '../schemas/common.yaml#/components/schemas/error_response'
              example:
                error: "Could not authenticate, invalid API Key"
    post:
      summary: Create a task
      tags:
        - Tasks
      description: Create a new task in your workspace.
      parameters:
        - $ref: '../schemas/common.yaml#/api_key_header'
        - $ref: '../schemas/common.yaml#/accept_header'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../schemas/task.yaml#/components/schemas/task_request'
      responses:
        '201':
          description: Task created successfully.
          content:
            application/json:
              schema:
                $ref: '../schemas/task.yaml#/components/schemas/task_response'
        '401':
          description: Unauthorized - Invalid or missing API key.
          content:
            application/json:
              schema:
                $ref: '../schemas/common.yaml#/components/schemas/error_response'
              example:
                error: "Could not authenticate, invalid API Key"
        '422':
          description: Validation error - Invalid or missing parameters.
          content:
            application/json:
              schema:
                $ref: '../schemas/common.yaml#/components/schemas/validation_error_response'
              example:
                errors: ["Title can't be blank"]

  /tasks/{id}:
    get:
      summary: Get a task
      tags:
        - Tasks
      description: Retrieve a single task by its ID.
      parameters:
        - $ref: '../schemas/common.yaml#/api_key_header'
        - $ref: '../schemas/common.yaml#/accept_header'
        - name: id
          in: path
          required: true
          description: The ID of the task to retrieve.
          schema:
            type: string
      responses:
        '200':
          description: Successfully retrieved the task.
          content:
            application/json:
              schema:
                $ref: '../schemas/task.yaml#/components/schemas/task_response'
        '401':
          description: Unauthorized - Invalid or missing API key.
          content:
            application/json:
              schema:
                $ref: '../schemas/common.yaml#/components/schemas/error_response'
              example:
                error: "Could not authenticate, invalid API Key"
        '404':
          description: Task not found.
          content:
            application/json:
              schema:
                $ref: '../schemas/common.yaml#/components/schemas/error_response'
              example:
                error: "Task not found"
    patch:
      summary: Update a task
      tags:
        - Tasks
      description: Update an existing task by its ID.
      parameters:
        - $ref: '../schemas/common.yaml#/api_key_header'
        - $ref: '../schemas/common.yaml#/accept_header'
        - name: id
          in: path
          required: true
          description: The ID of the task to update.
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../schemas/task.yaml#/components/schemas/task_request'
      responses:
        '200':
          description: Task updated successfully.
          content:
            application/json:
              schema:
                $ref: '../schemas/task.yaml#/components/schemas/task_response'
        '401':
          description: Unauthorized - Invalid or missing API key.
          content:
            application/json:
              schema:
                $ref: '../schemas/common.yaml#/components/schemas/error_response'
              example:
                error: "Could not authenticate, invalid API Key"
        '404':
          description: Task not found.
          content:
            application/json:
              schema:
                $ref: '../schemas/common.yaml#/components/schemas/error_response'
              example:
                error: "Task not found"
        '422':
          description: Validation error - Invalid parameters.
          content:
            application/json:
              schema:
                $ref: '../schemas/common.yaml#/components/schemas/validation_error_response'
              example:
                errors: ["Title can't be blank"]
    delete:
      summary: Delete a task
      tags:
        - Tasks
      description: Delete a task by its ID.
      parameters:
        - $ref: '../schemas/common.yaml#/api_key_header'
        - $ref: '../schemas/common.yaml#/accept_header'
        - name: id
          in: path
          required: true
          description: The ID of the task to delete.
          schema:
            type: string
      responses:
        '200':
          description: Task deleted successfully.
          content:
            application/json:
              schema:
                $ref: '../schemas/task.yaml#/components/schemas/task_delete_response'
        '401':
          description: Unauthorized - Invalid or missing API key.
          content:
            application/json:
              schema:
                $ref: '../schemas/common.yaml#/components/schemas/error_response'
              example:
                error: "Could not authenticate, invalid API Key"
        '404':
          description: Task not found.
          content:
            application/json:
              schema:
                $ref: '../schemas/common.yaml#/components/schemas/error_response'
              example:
                error: "Task not found"
