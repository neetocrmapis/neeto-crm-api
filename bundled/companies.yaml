openapi: 3.0.3
info:
  title: NeetoCRM Companies APIs
  version: 1.0.0
  description: APIs for managing companies in your NeetoCRM workspace.
  contact:
    email: support@neetocrm.com
servers:
  - description: NeetoCRM APIs
    url: https://{your-subdomain}.neetocrm.com/api/external/v1
    variables:
      your-subdomain:
        default: spinkart
        description: Replace **spinkart** with your [workspace's subdomain](/getting-started/identifying-subdomain).
tags:
  - name: Companies
    description: APIs to manage companies in your workspace.
paths:
  /companies:
    get:
      summary: List all companies
      tags:
        - Companies
      description: Retrieve a list of all companies in your workspace. Results are ordered by creation date (newest first).
      parameters:
        - $ref: '#/components/parameters/api_key_header'
        - $ref: '#/components/parameters/accept_header'
        - $ref: '#/components/parameters/page_number_param'
        - $ref: '#/components/parameters/page_size_param'
      responses:
        '200':
          description: Successfully retrieved companies.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/company_list_response'
    post:
      summary: Create a company
      tags:
        - Companies
      description: Create a new company in your workspace.
      parameters:
        - $ref: '#/components/parameters/api_key_header'
        - $ref: '#/components/parameters/accept_header'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/company_request'
      responses:
        '201':
          description: Company created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/company_response'
  /companies/{id}:
    get:
      summary: Get a company
      tags:
        - Companies
      description: Retrieve a single company by its ID.
      parameters:
        - $ref: '#/components/parameters/api_key_header'
        - $ref: '#/components/parameters/accept_header'
        - name: id
          in: path
          required: true
          description: The ID of the company to retrieve. You can get the company `id` by listing all companies using our [List all companies](/api-reference/companies/list-companies) API.
          schema:
            type: string
      responses:
        '200':
          description: Successfully retrieved the company.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/company_response'
    patch:
      summary: Update a company
      tags:
        - Companies
      description: Update an existing company by its ID.
      parameters:
        - $ref: '#/components/parameters/api_key_header'
        - $ref: '#/components/parameters/accept_header'
        - name: id
          in: path
          required: true
          description: The ID of the company to update. You can get the company `id` by listing all companies using our [List all companies](/api-reference/companies/list-companies) API.
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/company_request'
      responses:
        '200':
          description: Company updated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/company_response'
    delete:
      summary: Delete a company
      tags:
        - Companies
      description: Delete a company by its ID.
      parameters:
        - $ref: '#/components/parameters/api_key_header'
        - $ref: '#/components/parameters/accept_header'
        - name: id
          in: path
          required: true
          description: The ID of the company to delete. You can get the company `id` by listing all companies using our [List all companies](/api-reference/companies/list-companies) API.
          schema:
            type: string
      responses:
        '200':
          description: Company deleted successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/company_delete_response'
components:
  parameters:
    api_key_header:
      in: header
      name: X-Api-Key
      description: X-Api-Key is used to authenticate requests using an API key. Provide your API key in this header to access protected endpoints. Refer to [Authentication](/getting-started/authentication) for more information.
      required: true
      schema:
        type: string
    accept_header:
      in: header
      name: Accept
      description: Specifies the expected response format. Must be set to `application/json` for proper API communication.
      required: true
      schema:
        type: string
        enum:
          - application/json
        default: application/json
    page_number_param:
      in: query
      name: page_number
      description: Retrieve paginated results by specifying the desired page number. If this parameter is absent, all results will be returned.
      required: false
      schema:
        type: integer
    page_size_param:
      in: query
      name: page_size
      description: Set the number of results returned in the response. Defaulting to 30 when omitted.
      required: false
      schema:
        type: integer
  schemas:
    tag:
      type: object
      properties:
        id:
          type: string
          description: Unique identifier for the tag.
        name:
          type: string
          description: Name of the tag.
        style:
          type: string
          description: Style/color of the tag.
    company:
      type: object
      properties:
        id:
          type: string
          description: Unique identifier for the company.
        name:
          type: string
          description: Name of the company.
        address:
          type: string
          nullable: true
          description: Address of the company.
        source:
          type: string
          nullable: true
          description: Source of the company.
        tags:
          type: array
          items:
            $ref: '#/components/schemas/tag'
          description: Tags associated with the company.
        created_at:
          type: string
          format: date-time
          description: Timestamp when the company was created.
        updated_at:
          type: string
          format: date-time
          description: Timestamp when the company was last updated.
    pagination:
      type: object
      properties:
        total_records:
          type: integer
          description: Total number of records.
        total_pages:
          type: integer
          description: Total number of pages available.
        current_page_number:
          type: integer
          description: Current page number.
        page_size:
          type: integer
          description: Number of records per page.
    company_list_response:
      type: object
      properties:
        companies:
          type: array
          items:
            $ref: '#/components/schemas/company'
          description: List of companies.
        pagination:
          $ref: '#/components/schemas/pagination'
      example:
        companies:
          - id: a1b2c3d4-e5f6-7890-abcd-ef1234567890
            name: Eve Corp
            address: 123 Main St, New York, NY
            source: null
            tags: []
            created_at: '2025-03-15T10:30:00.000Z'
            updated_at: '2025-03-15T10:30:00.000Z'
          - id: b2c3d4e5-f6a7-8901-bcde-f12345678901
            name: Oliver Industries
            address: 456 Oak Ave, San Francisco, CA
            source: null
            tags: []
            created_at: '2025-03-14T14:22:00.000Z'
            updated_at: '2025-03-14T14:22:00.000Z'
        pagination:
          total_records: 42
          total_pages: 2
          current_page_number: 1
          page_size: 30
    company_request:
      type: object
      properties:
        company:
          type: object
          required:
            - name
          properties:
            name:
              type: string
              description: Company name.
              example: Eve Corp
            address:
              type: string
              description: Company address.
              example: 123 Main St, New York, NY
            tag_ids:
              type: array
              items:
                type: string
              description: Array of tag IDs.
              example:
                - a1b2c3d4-e5f6-7890-abcd-ef1234567890
                - b2c3d4e5-f6a7-8901-bcde-f12345678901
    company_response:
      type: object
      properties:
        company:
          $ref: '#/components/schemas/company'
      example:
        company:
          id: a1b2c3d4-e5f6-7890-abcd-ef1234567890
          name: Eve Corp
          address: 123 Main St, New York, NY
          source: null
          tags: []
          created_at: '2025-03-15T10:30:00.000Z'
          updated_at: '2025-03-15T10:30:00.000Z'
    company_delete_response:
      type: object
      properties:
        message:
          type: string
      example:
        message: Company deleted successfully
