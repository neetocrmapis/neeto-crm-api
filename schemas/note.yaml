components:
  schemas:
    # Note object structure
    note:
      type: object
      properties:
        id:
          type: string
          description: Unique identifier for the note.
        content:
          type: string
          description: Content of the note.
        user_id:
          type: string
          description: Unique identifier of the user who created the note.
        created_at:
          type: string
          format: date-time
          description: Timestamp when the note was created.
        updated_at:
          type: string
          format: date-time
          description: Timestamp when the note was last updated.

    # Note create request
    note_create_request:
      type: object
      required:
        - note
        - resource_type
        - resource_id
      properties:
        note:
          type: object
          required:
            - content
          properties:
            content:
              type: string
              description: Note content.
              example: "Important note about Eve"
        resource_type:
          type: string
          enum: [contacts, companies, deals, leads]
          description: Type of resource to attach the note to.
          example: "contacts"
        resource_id:
          type: integer
          description: ID of the resource.
          example: 1

    # Note update request
    note_update_request:
      type: object
      properties:
        note:
          type: object
          properties:
            content:
              type: string
              description: Updated note content.
              example: "Updated note about Oliver"

    # Note list response structure
    note_list_response:
      type: object
      properties:
        notes:
          type: array
          items:
            $ref: "#/components/schemas/note"
          description: List of notes.
        pagination:
          $ref: "../schemas/common.yaml#/components/schemas/pagination"
      example:
        notes:
          - id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
            content: "Important note about Eve"
            user_id: "u1b2c3d4-e5f6-7890-abcd-ef1234567890"
            created_at: "2025-03-15T10:30:00.000Z"
            updated_at: "2025-03-15T10:30:00.000Z"
          - id: "b2c3d4e5-f6a7-8901-bcde-f12345678901"
            content: "Follow-up call with Oliver scheduled"
            user_id: "u1b2c3d4-e5f6-7890-abcd-ef1234567890"
            created_at: "2025-03-14T14:22:00.000Z"
            updated_at: "2025-03-14T14:22:00.000Z"
        pagination:
          total_records: 42
          total_pages: 2
          current_page_number: 1
          page_size: 30

    # Single note response
    note_response:
      type: object
      properties:
        note:
          $ref: "#/components/schemas/note"
      example:
        note:
          id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
          content: "Important note about Eve"
          user_id: "u1b2c3d4-e5f6-7890-abcd-ef1234567890"
          created_at: "2025-03-15T10:30:00.000Z"
          updated_at: "2025-03-15T10:30:00.000Z"

    # Delete response
    note_delete_response:
      type: object
      properties:
        message:
          type: string
      example:
        message: "Note deleted successfully"
