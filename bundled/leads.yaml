openapi: 3.0.3
info:
  title: NeetoCRM Leads APIs
  version: 1.0.0
  description: APIs for managing leads in your NeetoCRM workspace.
  contact:
    email: support@neetocrm.com
servers:
  - description: NeetoCRM APIs
    url: https://{your-subdomain}.neetocrm.com/api/external/v1
    variables:
      your-subdomain:
        default: spinkart
        description: Replace **spinkart** with your [workspace's subdomain](/getting-started/identifying-subdomain).
tags:
  - name: Leads
    description: APIs to manage leads in your workspace.
paths:
  /leads:
    get:
      summary: List all leads
      tags:
        - Leads
      description: Retrieve a list of all leads in your workspace. Results are ordered by creation date (newest first).
      parameters:
        - $ref: '#/components/parameters/api_key_header'
        - $ref: '#/components/parameters/accept_header'
        - $ref: '#/components/parameters/page_number_param'
        - $ref: '#/components/parameters/page_size_param'
      responses:
        '200':
          description: Successfully retrieved leads.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/lead_list_response'
    post:
      summary: Create a lead
      tags:
        - Leads
      description: Create a new lead in your workspace.
      parameters:
        - $ref: '#/components/parameters/api_key_header'
        - $ref: '#/components/parameters/accept_header'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/lead_request'
      responses:
        '201':
          description: Lead created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/lead_response'
  /leads/{id}:
    get:
      summary: Get a lead
      tags:
        - Leads
      description: Retrieve a single lead by its ID.
      parameters:
        - $ref: '#/components/parameters/api_key_header'
        - $ref: '#/components/parameters/accept_header'
        - name: id
          in: path
          required: true
          description: The ID of the lead to retrieve. You can get the lead `id` by listing all leads using our [List all leads](/api-reference/leads/list-leads) API.
          schema:
            type: string
      responses:
        '200':
          description: Successfully retrieved the lead.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/lead_response'
    patch:
      summary: Update a lead
      tags:
        - Leads
      description: Update an existing lead by its ID.
      parameters:
        - $ref: '#/components/parameters/api_key_header'
        - $ref: '#/components/parameters/accept_header'
        - name: id
          in: path
          required: true
          description: The ID of the lead to update. You can get the lead `id` by listing all leads using our [List all leads](/api-reference/leads/list-leads) API.
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/lead_request'
      responses:
        '200':
          description: Lead updated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/lead_response'
    delete:
      summary: Delete a lead
      tags:
        - Leads
      description: Delete a lead by its ID.
      parameters:
        - $ref: '#/components/parameters/api_key_header'
        - $ref: '#/components/parameters/accept_header'
        - name: id
          in: path
          required: true
          description: The ID of the lead to delete. You can get the lead `id` by listing all leads using our [List all leads](/api-reference/leads/list-leads) API.
          schema:
            type: string
      responses:
        '200':
          description: Lead deleted successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/lead_delete_response'
components:
  parameters:
    api_key_header:
      in: header
      name: X-Api-Key
      description: X-Api-Key is used to authenticate requests using an API key. Provide your API key in this header to access protected endpoints. Refer to [Authentication](/getting-started/authentication) for more information.
      required: true
      schema:
        type: string
    accept_header:
      in: header
      name: Accept
      description: Specifies the expected response format. Must be set to `application/json` for proper API communication.
      required: true
      schema:
        type: string
        enum:
          - application/json
        default: application/json
    page_number_param:
      in: query
      name: page_number
      description: Retrieve paginated results by specifying the desired page number. If this parameter is absent, all results will be returned.
      required: false
      schema:
        type: integer
    page_size_param:
      in: query
      name: page_size
      description: Set the number of results returned in the response. Defaulting to 30 when omitted.
      required: false
      schema:
        type: integer
  schemas:
    tag:
      type: object
      properties:
        id:
          type: string
          description: Unique identifier for the tag.
        name:
          type: string
          description: Name of the tag.
        style:
          type: string
          description: Style/color of the tag.
    lead:
      type: object
      properties:
        id:
          type: string
          description: Unique identifier for the lead.
        name:
          type: string
          description: Name of the lead.
        status:
          type: string
          enum:
            - open
            - converted
            - archived
          description: Current status of the lead.
        unique_number:
          type: string
          description: Auto-generated unique number for the lead.
        email:
          type: string
          nullable: true
          description: Email address of the lead (from associated contact).
        phone_number:
          type: string
          nullable: true
          description: Phone number of the lead (from associated contact).
        contact_name:
          type: string
          nullable: true
          description: Name of the associated contact.
        contact_id:
          type: string
          nullable: true
          description: Unique identifier of the associated contact.
        company_name:
          type: string
          nullable: true
          description: Name of the associated company.
        company_id:
          type: string
          nullable: true
          description: Unique identifier of the associated company.
        owner:
          type: object
          nullable: true
          description: Owner of the lead.
          properties:
            id:
              type: string
              description: Unique identifier of the owner.
            name:
              type: string
              description: Name of the owner.
        tags:
          type: array
          items:
            $ref: '#/components/schemas/tag'
          description: Tags associated with the lead.
        created_at:
          type: string
          format: date-time
          description: Timestamp when the lead was created.
        updated_at:
          type: string
          format: date-time
          description: Timestamp when the lead was last updated.
    pagination:
      type: object
      properties:
        total_records:
          type: integer
          description: Total number of records.
        total_pages:
          type: integer
          description: Total number of pages available.
        current_page_number:
          type: integer
          description: Current page number.
        page_size:
          type: integer
          description: Number of records per page.
    lead_list_response:
      type: object
      properties:
        leads:
          type: array
          items:
            $ref: '#/components/schemas/lead'
          description: List of leads.
        pagination:
          $ref: '#/components/schemas/pagination'
      example:
        leads:
          - id: a1b2c3d4-e5f6-7890-abcd-ef1234567890
            name: Eve
            status: open
            unique_number: L-001
            email: eve@example.com
            phone_number: ''
            contact_name: Eve
            contact_id: null
            company_name: null
            company_id: null
            owner: null
            tags: []
            created_at: '2025-03-15T10:30:00.000Z'
            updated_at: '2025-03-15T10:30:00.000Z'
          - id: b2c3d4e5-f6a7-8901-bcde-f12345678901
            name: Oliver
            status: converted
            unique_number: L-002
            email: oliver@example.com
            phone_number: '+1555123456'
            contact_name: Oliver
            contact_id: c1d2e3f4-a5b6-7890-cdef-123456789012
            company_name: Oliver Industries
            company_id: d2e3f4a5-b6c7-8901-def0-234567890123
            owner: null
            tags: []
            created_at: '2025-03-14T14:22:00.000Z'
            updated_at: '2025-03-14T14:22:00.000Z'
        pagination:
          total_records: 42
          total_pages: 2
          current_page_number: 1
          page_size: 30
    lead_request:
      type: object
      properties:
        lead:
          type: object
          required:
            - name
          properties:
            name:
              type: string
              description: Lead name.
              example: Eve
            status:
              type: string
              enum:
                - open
                - converted
                - archived
              description: Lead status.
              example: open
            company_id:
              type: string
              description: Unique identifier of the associated company.
              example: a1b2c3d4-e5f6-7890-abcd-ef1234567890
            contact_id:
              type: integer
              description: Associated contact ID.
              example: 1
            owner_id:
              type: string
              description: Unique identifier of the owner.
              example: a1b2c3d4-e5f6-7890-abcd-ef1234567890
            tag_ids:
              type: array
              items:
                type: string
              description: Array of tag IDs.
              example:
                - a1b2c3d4-e5f6-7890-abcd-ef1234567890
                - b2c3d4e5-f6a7-8901-bcde-f12345678901
    lead_response:
      type: object
      properties:
        lead:
          $ref: '#/components/schemas/lead'
      example:
        lead:
          id: a1b2c3d4-e5f6-7890-abcd-ef1234567890
          name: Eve
          status: open
          unique_number: L-001
          email: eve@example.com
          phone_number: ''
          contact_name: Eve
          contact_id: null
          company_name: null
          company_id: null
          owner: null
          tags: []
          created_at: '2025-03-15T10:30:00.000Z'
          updated_at: '2025-03-15T10:30:00.000Z'
    lead_delete_response:
      type: object
      properties:
        message:
          type: string
      example:
        message: Lead deleted successfully
